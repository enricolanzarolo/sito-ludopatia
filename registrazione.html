<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione | Ludopatia</title>
    <link rel="stylesheet" href="stileregistrazione.css">
    <script src="sito.js"></script>
</head>
<body>
    <div class="container">
        <h2>Registrati per continuare</h2>
        <form id="registrazioneForm" onsubmit="return validaRegistrazione()">
            <label for="eta">Età:</label>
            <input type="text" id="eta" name="eta" placeholder="Inserire l'età" required>

            <button type="submit">Registrati</button>
        </form>
    </div>
</body>
</html>
